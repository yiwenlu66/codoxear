<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Codoxear</title>
    <script>
      (function () {
        const p = window.location.pathname || "/";
        const last = p.split("/").filter(Boolean).pop() || "";
        if (!p.endsWith("/") && !last.includes(".")) {
          const u = new URL(window.location.href);
          u.pathname = p + "/";
          window.location.replace(u.toString());
        }
      })();
    </script>
    <script>
      window.CODOXEAR_ASSET_VERSION = "__CODOXEAR_ASSET_VERSION__";
    </script>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
			    <link rel="stylesheet" href="app.css?v=__CODOXEAR_ASSET_VERSION__" />
  </head>
  <body>
    <div id="root"></div>
		    <script src="app.js?v=__CODOXEAR_ASSET_VERSION__" defer></script>
		  </body>
		</html>
