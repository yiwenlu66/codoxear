    <script>
      (function () {
        const p = window.location.pathname || "/";
        const last = p.split("/").filter(Boolean).pop() || "";
        if (!p.endsWith("/") && !last.includes(".")) {
          const u = new URL(window.location.href);
          u.pathname = p + "/";
          window.location.replace(u.toString());
        }
      })();
    </script>
